<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Food Store</title>
    </head>
<body>
    <div id="app">
        <h1>Crear Cuenta</h1>
        <p>Regístrate para acceder a nuestra tienda.</p>

        <form id="formRegistro">
            <div>
                <label for="email">Correo Electrónico:</label><br>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>
            <br>
            <div>
                <label for="password">Contraseña:</label><br>
                <input type="password" id="password" placeholder="Tu contraseña" required>
            </div>
            <br>
            <button type="button" id="btnRegistrar">Registrarme</button>
        </form>

        <p>¿Ya tienes cuenta? <a href="../login/login.html">Inicia sesión aquí</a></p>
    </div>

    <script type="module" src="./registro.ts"></script>
</body>
</html>
