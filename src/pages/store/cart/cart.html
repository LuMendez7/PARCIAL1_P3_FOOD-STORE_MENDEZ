<body style="margin:0; font-family:Arial; background:#ecfdf5;">

<header style="
  background:#065f46;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
">
  <h2 style="margin:0; display:flex; align-items:center; gap:8px;">
    <img src="/src/assets/carrito.png" width="25" />
    Carrito
  </h2>

  <a href="../home/home.html" style="color:white; text-decoration:none;">
    Volver al Catalogo
  </a>
</header>

<div style="
  padding:20px;
  display:flex;
  gap:30px;
  align-items:flex-start;
  justify-content:center;
  max-width:1000px;
  margin:0 auto;
">

  <div style="flex:1.5; max-width:600px;">
    <h1 style="color:#065f46;">Tu compra</h1>
    <div id="lista-carrito"></div>
  </div>

  <div style="
    flex:0.8;
    max-width:260px;
    background:white;
    padding:18px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    height:fit-content;
    position:sticky;
    top:20px;
  ">

    <h3 style="color:#065f46; margin-bottom:10px;">Resumen</h3>

    <div style="display:flex; justify-content:space-between; font-size:14px;">
      <span>Subtotal</span>
      <span>$<span id="subtotal">0</span></span>
    </div>

    <hr style="border:none; border-top:1px solid #ddd; margin:10px 0;">

    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span style="font-weight:bold; font-size:18px; color:#064e3b;">
        TOTAL
      </span>

      <span style="font-weight:bold; font-size:20px; color:#064e3b;">
        $<span id="total">0</span>
      </span>
    </div>

    <button id="finalizar" style="
      width:100%;
      margin-top:12px;
      background:#16a34a;
      color:white;
      border:none;
      padding:10px;
      border-radius:8px;
      font-weight:bold;
      opacity:0.7;
      cursor:not-allowed;
    ">
      Finalizar compra
    </button>

    <div style="
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      margin-top:10px;
      font-size:12px;
      color:#6b7280;
      text-align:center;
      background:#fffbeb;
      padding:8px;
      border-radius:8px;
    ">

      <div style="
        width:22px;
        height:22px;
        border-radius:50%;
        background:#facc15;
        color:#78350f;
        display:flex;
        align-items:center;
        justify-content:center;
        font-weight:bold;
        font-size:14px;
        margin-bottom:4px;
      ">
        !
      </div>

      <span>El checkout no esta disponible en esta version</span>

    </div>

    <button id="vaciar" style="
      width:100%;
      margin-top:10px;
      background:#ef4444;
      color:white;
      border:none;
      padding:9px;
      border-radius:6px;
      cursor:pointer;
    ">
      Vaciar carrito
    </button>

  </div>

</div>

<script type="module" src="./cart.js"></script>

</body>
