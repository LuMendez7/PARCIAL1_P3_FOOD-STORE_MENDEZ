<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Food Store</title>
</head>
<body>
    <div id="app">
        <h1>Iniciar Sesión</h1>
        <form>
            <div>
                <label>Correo Electrónico:</label><br>
                <input type="email" id="loginEmail" placeholder="ejemplo@correo.com">
            </div>
            <br>
            <div>
                <label>Contraseña:</label><br>
                <input type="password" id="loginPass" placeholder="Tu contraseña">
            </div>
            <br>
            <button type="button" id="btnIngresar">Ingresar</button>
        </form>
        <p>¿No tienes cuenta? <a href="../registro/registro.html">Regístrate aquí</a></p>
    </div>
    <script type="module" src="./login.ts"></script>
</body>
</html>
